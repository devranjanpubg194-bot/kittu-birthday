<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kittu Birthday Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{
margin:0;
padding:20px;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
position:relative;
background:linear-gradient(180deg,#fff5f8 0%,#ffe9f2 30%,#ffdce9 60%,#fff2f7 100%);
}
body:before{
content:"";
position:fixed;
inset:0;
background:url("78a78c97-d890-472d-a04a-3b7da533e8fd.png") center/cover no-repeat;
opacity:.10;
filter:blur(2px);
z-index:-1;
}
.card{width:min(92vw,390px);aspect-ratio:9/19;max-height:95vh;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-radius:24px;padding:18px;display:flex;
margin:auto;flex-direction:column;justify-content:space-between;text-align:center;box-shadow:0 10px 30px rgba(255,105,180,.25)}
img{width:100%;border-radius:18px}
h1{font-family:"Great Vibes",cursive;color:#d63384;font-size:2.4rem;
text-shadow:0 0 18px rgba(255,105,180,.35);
animation:floatTitle 3s ease-in-out infinite}
@keyframes floatTitle{50%{transform:translateY(-4px)}}
.sub{color:#9a6c7b}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}
.box{
background:linear-gradient(180deg,#fff,#ffe8f1);
padding:12px;
border-radius:18px;
border:1px solid rgba(255,255,255,.8);
box-shadow:0 0 18px rgba(255,105,180,.25);
animation:pulse 2.5s infinite;
}
@keyframes pulse{
0%,100%{transform:scale(1);box-shadow:0 0 18px rgba(255,105,180,.25);}
50%{transform:scale(1.05);box-shadow:0 0 30px rgba(255,105,180,.45);}
}.num{font-size:1.4rem;font-weight:700;color:#c2185b}.lab{font-size:.7rem}
.heart{position:fixed;bottom:-30px;color:#ff7aa8;animation:up 10s linear infinite}
@keyframes up{to{transform:translateY(-120vh);opacity:0}}
.cake{margin:20px auto;width:180px}.layer{height:40px;border-radius:10px;background:#ffb6c1;margin:4px}.layer:nth-child(2){background:#ffc8d8}.layer:nth-child(3){background:#ff8fb1}
.candle{width:8px;height:28px;background:#fff;margin:0 auto;position:relative}.flame{position:absolute;width:10px;height:10px;background:orange;border-radius:50%;left:-1px;top:-10px;animation:f .4s infinite alternate}@keyframes f{to{transform:scale(.7)}}
</style></head><body>
<div class="card">
<img src="ChatGPT Image Jul 1, 2026, 11_24_52 AM.png">
<h1>Happy Birthday Kittu ❤️</h1>
<p class="sub">Counting every moment until your special day.</p>
<div class="grid">
<div class="box"><div id=d class=num>00</div><div class=lab>Days</div></div>
<div class="box"><div id=h class=num>00</div><div class=lab>Hours</div></div>
<div class="box"><div id=m class=num>00</div><div class=lab>Minutes</div></div>
<div class="box"><div id=s class=num>00</div><div class=lab>Seconds</div></div>
</div>
<p style="margin-top:24px;font-size:22px;color:#d63384;font-family:"Great Vibes",cursive;">I Love You Forever ❤️</p>
</div>
<script>
for(let i=0;i<30;i++){let e=document.createElement('div');e.className='heart';e.textContent=Math.random()>.5?'❤':'💕';e.style.left=Math.random()*100+'%';e.style.animationDuration=6+Math.random()*6+'s';e.style.animationDelay=Math.random()*8+'s';document.body.appendChild(e);}
const target=new Date("2026-07-23T00:00:00").getTime();
setInterval(()=>{
let x=target-Date.now();if(x<0)x=0;
let d=Math.floor(x/86400000),h=Math.floor(x%86400000/3600000),m=Math.floor(x%3600000/60000),s=Math.floor(x%60000/1000);
document.getElementById('d').textContent=String(d).padStart(2,'0');
document.getElementById('h').textContent=String(h).padStart(2,'0');
document.getElementById('m').textContent=String(m).padStart(2,'0');
document.getElementById('s').textContent=String(s).padStart(2,'0');
},1000);
</script></body></html>
